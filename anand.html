<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍆</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .emoji {
      font-size: clamp(120px, 30vmin, 400px);
      line-height: 1;
      user-select: none;
      animation: breathe 4s ease-in-out infinite;
      filter: drop-shadow(0 0 60px rgba(100, 0, 160, 0.6));
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1);   filter: drop-shadow(0 0 60px rgba(100, 0, 160, 0.6)); }
      50%       { transform: scale(1.04); filter: drop-shadow(0 0 100px rgba(140, 0, 220, 0.9)); }
    }
  </style>
</head>
<body>
  <div class="emoji">🍆</div>
</body>
</html>

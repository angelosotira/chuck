         w5: { name:"4w5 — The Bohemian",    text:"More introverted and cerebral. The creative impulse goes inward — into ideas, obsessions, artistic depth. Often unconventional, private, and intensely individualistic." }

function deriveMetrics(scores) {
  const s = scores;

  // Centers
  const body  = s[8] + s[9] + s[1];
  const heart = s[2] + s[3] + s[4];
  const mind  = s[5] + s[6] + s[7];
  const cTotal = body + heart + mind || 1;

  // Hornevian (interaction style)
  const assertive = s[3] + s[7] + s[8];
  const compliant = s[1] + s[2] + s[6];
  const withdrawn = s[4] + s[5] + s[9];
  const hTotal = assertive + compliant + withdrawn || 1;

  // Harmonic (conflict style)
  const competency     = s[1] + s[3] + s[5];
  const positiveOutlook = s[2] + s[7] + s[9];
  const reactive       = s[4] + s[6] + s[8];
  const hmTotal = competency + positiveOutlook + reactive || 1;

  return {
    centers: {
      body:  { label: "Action (Body)",   pct: Math.round(body  / cTotal * 100) },
      heart: { label: "Feeling (Heart)", pct: Math.round(heart / cTotal * 100) },
      mind:  { label: "Thinking (Mind)", pct: Math.round(mind  / cTotal * 100) },
    },
    hornevian: {
      assertive: { label: "Assertive", pct: Math.round(assertive / hTotal * 100) },
      compliant: { label: "Compliant", pct: Math.round(compliant / hTotal * 100) },
      withdrawn: { label: "Withdrawn", pct: Math.round(withdrawn / hTotal * 100) },
    },
    harmonic: {
      competency:     { label: "Competency",      pct: Math.round(competency     / hmTotal * 100) },
      positiveOutlook:{ label: "Positive Outlook", pct: Math.round(positiveOutlook / hmTotal * 100) },
      reactive:       { label: "Reactive",        pct: Math.round(reactive       / hmTotal * 100) },
    }
  };
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { day:'numeric', month:'long', year:'numeric' }).toUpperCase();
}

function renderBar(pct, color, alpha) {
  return `<div class="tri-bar-wrap"><div class="tri-bar-fill" style="width:${pct}%;background:${color};opacity:${alpha||1}"></div></div>`;
}

function render(data) {
  const { name, top_type, scores, created_at } = data;
  const t = T[top_type];
  const metrics = deriveMetrics(scores);
  const maxScore = Math.max(...Object.values(scores));

  // Wings (adjacent types, wrapping 1↔9)
  const wingA = top_type === 1 ? 9 : top_type - 1;
  const wingB = top_type === 9 ? 1 : top_type + 1;
  const wingAData = t.wings[`w${wingA}`];
  const wingBData = t.wings[`w${wingB}`];

  // Sort profile by score desc
  const profileSorted = Object.entries(scores)
    .map(([type, score]) => ({ type: parseInt(type), score }))
    .sort((a, b) => b.score - a.score);

  const profileRows = profileSorted.map(({ type, score }) => {
    const isTop = type === top_type;
    const pct = maxScore > 0 ? Math.round(score / maxScore * 100) : 0;
    const col = T[type].hex;
    const rawPct = Math.round(score / 8 * 100); // out of 8 possible
    return `
      <div class="profile-row">
        <div class="profile-num" style="color:${isTop ? col : ''}">${type}</div>
        <div class="profile-label" style="color:${isTop ? 'rgba(255,255,255,0.6)' : ''}">${T[type].short}</div>
        <div class="profile-track">
          <div class="profile-fill" style="width:${pct}%;background:${isTop ? col : 'rgba(255,255,255,0.1)'}"></div>
        </div>
        <div class="profile-score" style="color:${isTop ? col : 'rgba(255,255,255,0.2)'}">
          ${rawPct}${isTop ? '<span style="font-size:0.6rem">%</span>' : '%'}
        </div>
      </div>
    `;
  }).join('');

  function triSection(items, colors) {
    return Object.values(items).map((item, i) => `
      <div class="tri-item">
        <div class="tri-label">${item.label}</div>
        ${renderBar(item.pct, colors[i], 0.8)}
        <div class="tri-pct">${item.pct}<span style="font-size:0.8rem;color:rgba(255,255,255,0.2)">%</span></div>
      </div>
    `).join('');
  }

  document.getElementById('report').innerHTML = `
    <div class="report-hero">
      <div class="hero-left">
        <div class="hero-name">${name}</div>
        <div class="hero-date">${formatDate(created_at)}</div>
        <div class="hero-type-number" style="color:${t.hex}">${top_type}</div>
        <div class="hero-type-name">${t.name.toUpperCase()}</div>
        <div class="hero-keyword">Keyword &nbsp;<span style="color:${t.hex}">${t.keyword}</span></div>
      </div>
      <div class="hero-right">
        <div class="report-label">Chord</div>
        <div class="report-label">Type Report</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Enneagram Profile</div>
      ${profileRows}
    </div>

    <div class="section">
      <div class="section-title">Centers of Expression</div>
      <div class="tri-grid">
        ${triSection(metrics.centers, ['#c8a96e','#e8748a','#4a90d9'])}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Interaction Style</div>
      <div class="tri-grid">
        ${triSection(metrics.hornevian, ['#e87449','#74c87a','#9b74e8'])}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Conflict Style</div>
      <div class="tri-grid">
        ${triSection(metrics.harmonic, ['#4ab8c8','#74c87a','#e84a4a'])}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Type Description</div>
      <div class="description-text">${t.description}</div>
    </div>

    <div class="section">
      <div class="section-title">Wings</div>
      <div class="wings-grid">
        <div class="wing-card">
          <div class="wing-label">Wing ${wingA}</div>
          <div class="wing-name">${wingAData ? wingAData.name : 'Type ' + wingA}</div>
          <div class="wing-text">${wingAData ? wingAData.text : ''}</div>
        </div>
        <div class="wing-card">
          <div class="wing-label">Wing ${wingB}</div>
          <div class="wing-name">${wingBData ? wingBData.name : 'Type ' + wingB}</div>
          <div class="wing-text">${wingBData ? wingBData.text : ''}</div>
        </div>
      </div>
    </div>

    <div class="report-actions">
      <a class="btn btn-primary" href="./index.html?add=${encodeURIComponent(name)}&type=${top_type}"
         style="--tc:${t.hex};--tr:${t.rgb}">Add ${name} to Chord</a>
      <a class="btn btn-ghost" href="./test.html">Take again</a>
      <a class="btn btn-ghost" href="./index.html">Open Chord</a>
    </div>
    <div class="confidential-note">Chord · Type Report · ${name} · ${formatDate(created_at)}</div>
  `;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('report').style.display = 'block';
  document.title = `Chord — ${name} · Type ${top_type}`;
}

// ─── Fetch & render ───────────────────────────────────────────────────────────
(async () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-state').style.display = 'flex';
    return;
  }

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/chord_results?id=eq.${id}&select=*`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const data = await res.json();
    if (!data || !data.length) throw new Error('not found');
    render(data[0]);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-state').style.display = 'flex';
  }
})();
</script>
</body>
</html>

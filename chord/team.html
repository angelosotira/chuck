function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  });
}

function renderMembersSection(members) {
  return members.map(m => {
    const col = TYPE_COLORS[m.top_type] || 'rgba(255,255,255,0.4)';
    const typeName = TYPE_NAMES[m.top_type] || `Type ${m.top_type}`;
    const resultLink = m.result_id
      ? `<a class="member-result-link" href="./result.html?id=${m.result_id}" target="_blank">View report →</a>`
      : '';
    return `
      <div class="member-row">
        <div class="member-badge" style="color:${col};border:1px solid ${col}33;">${m.top_type}</div>
        <div class="member-info">
          <div class="member-name">${m.name || 'Anonymous'}</div>
          <div class="member-type" style="color:${col}99;">${typeName.toUpperCase()}</div>
        </div>
        ${resultLink}
      </div>
    `;
  }).join('');
}

function renderWaitingState(memberCount) {
  const slots = [];
  for (let i = 0; i < 3; i++) {
    if (i < memberCount) {
      slots.push('<div class="slot filled">✓</div>');
    } else {
      slots.push('<div class="slot">?</div>');
    }
  }
  const needed = 3 - memberCount;
  return `
    <div class="waiting-card">
      <div style="color:rgba(255,255,255,0.35);font-size:0.95rem;">Waiting for ${needed} more member${needed !== 1 ? 's' : ''}…</div>
      <div style="margin-top:0.5rem;font-size:0.78rem;">The Chord analysis unlocks with 3 members.</div>
      <div class="waiting-slots">${slots.join('')}</div>
    </div>
  `;
}

function renderAnalysis(members) {
  // Get the top 3 types (sorted ascending) for matrix lookup
  const types = members.map(m => m.top_type).sort((a, b) => a - b);
  const key = types.join('-');
  const combo = TEAM_MATRIX[key];

  if (!combo) {
    return `<div style="color:rgba(255,255,255,0.3);font-size:0.85rem;">No analysis available for this type combination.</div>`;
  }

  const rec4Color = TYPE_COLORS[combo.rec4] || '#e0e0ec';
  const rec4Name = TYPE_NAMES[combo.rec4] || `Type ${combo.rec4}`;
  const powerPct = (combo.score / 10) * 100;

  const strengthItems = combo.strengths.map(s => `<li>${s}</li>`).join('');
  const weaknessItems = combo.weaknesses.map(w => `<li>${w}</li>`).join('');

  return `
    <div class="analysis-headline">${combo.headline}</div>
    <div class="analysis-types-badge">Types ${key} · Chord Analysis</div>

    <div class="sw-grid">
      <div class="sw-card strengths">
        <div class="sw-label">Strengths</div>
        <ul class="sw-list">${strengthItems}</ul>
      </div>
      <div class="sw-card weaknesses">
        <div class="sw-label">Challenges</div>
        <ul class="sw-list">${weaknessItems}</ul>
      </div>
    </div>

    <div class="power-score-section">
      <div class="power-label">Team Power Score</div>
      <div class="power-bar-wrap">
        <div class="power-track">
          <div class="power-fill" style="width:${powerPct}%"></div>
        </div>
        <div class="power-number">${combo.score}<span class="power-denom">/10</span></div>
      </div>
    </div>

    <div class="rec4-card">
      <div class="rec4-label">Recommended 4th Member</div>
      <div class="rec4-type" style="color:${rec4Color};">Type ${combo.rec4} &nbsp;·&nbsp; <span style="font-size:0.9rem;color:${rec4Color}88;">${rec4Name}</span></div>
      <div class="rec4-reason">${combo.rec4reason}</div>
    </div>
  `;
}

function renderLargeTeamAnalysis(members) {
  // For 4+ member teams, show the top 3 types analysis with a note
  const typeCounts = {};
  members.forEach(m => {
    typeCounts[m.top_type] = (typeCounts[m.top_type] || 0) + 1;
  });
  // Get top 3 distinct types by frequency, then by type number
  const topTypes = Object.entries(typeCounts)
    .sort((a, b) => b[1] - a[1] || a[0] - b[0])
    .slice(0, 3)
    .map(([t]) => parseInt(t))
    .sort((a, b) => a - b);

  const key = topTypes.join('-');
  const combo = TEAM_MATRIX[key];

  if (!combo) {
    return `<div style="color:rgba(255,255,255,0.3);font-size:0.85rem;">No matrix analysis available for this combination.</div>`;
  }

  const rec4Color = TYPE_COLORS[combo.rec4] || '#e0e0ec';
  const rec4Name = TYPE_NAMES[combo.rec4] || `Type ${combo.rec4}`;
  const powerPct = (combo.score / 10) * 100;
  const strengthItems = combo.strengths.map(s => `<li>${s}</li>`).join('');
  const weaknessItems = combo.weaknesses.map(w => `<li>${w}</li>`).join('');

  return `
    <div class="large-team-note">
      The Chord matrix is optimized for 3-person core teams. Showing analysis for your dominant type combination: <strong>${key}</strong>.
    </div>
    <div class="analysis-headline">${combo.headline}</div>
    <div class="analysis-types-badge">Types ${key} · Core Trio Analysis</div>

    <div class="sw-grid">
      <div class="sw-card strengths">
        <div class="sw-label">Strengths</div>
        <ul class="sw-list">${strengthItems}</ul>
      </div>
      <div class="sw-card weaknesses">
        <div class="sw-label">Challenges</div>
        <ul class="sw-list">${weaknessItems}</ul>
      </div>
    </div>

    <div class="power-score-section">
      <div class="power-label">Team Power Score</div>
      <div class="power-bar-wrap">
        <div class="power-track">
          <div class="power-fill" style="width:${powerPct}%"></div>
        </div>
        <div class="power-number">${combo.score}<span class="power-denom">/10</span></div>
      </div>
    </div>

    <div class="rec4-card">
      <div class="rec4-label">Recommended Addition</div>
      <div class="rec4-type" style="color:${rec4Color};">Type ${combo.rec4} &nbsp;·&nbsp; <span style="font-size:0.9rem;color:${rec4Color}88;">${rec4Name}</span></div>
      <div class="rec4-reason">${combo.rec4reason}</div>
    </div>
  `;
}

function render(team, members) {
  const memberCount = members.length;
  const inviteUrl = `https://chuck.neoteric.art/chord/test.html?join=${team.invite_code}`;

  let analysisHtml = '';
  let analysisSectionTitle = '';

  if (memberCount === 0) {
    analysisSectionTitle = 'No Members Yet';
    analysisHtml = `<div style="color:rgba(255,255,255,0.25);font-size:0.85rem;">Share the invite link to start building your team.</div>`;
  } else if (memberCount < 3) {
    analysisSectionTitle = 'Chord Analysis';
    analysisHtml = renderWaitingState(memberCount);
  } else if (memberCount === 3) {
    analysisSectionTitle = 'Chord Analysis';
    analysisHtml = renderAnalysis(members);
  } else {
    analysisSectionTitle = 'Chord Analysis';
    analysisHtml = renderLargeTeamAnalysis(members);
  }

  const memberCountLabel = memberCount === 1 ? '1 member' : `${memberCount} members`;

  document.getElementById('team-view').innerHTML = `
    <div class="team-hero">
      <div class="team-name">${team.name}</div>
      <div class="team-meta">${memberCountLabel} · Chord Team</div>
      <button class="btn-invite" id="btn-invite-copy">Invite someone to this team</button>
    </div>

    <div class="section">
      <div class="section-title">Members</div>
      <div class="members-list">
        ${memberCount > 0 ? renderMembersSection(members) : '<div style="color:rgba(255,255,255,0.2);font-size:0.85rem;">No members yet.</div>'}
      </div>
    </div>

    <div class="section">
      <div class="section-title">${analysisSectionTitle}</div>
      ${analysisHtml}
    </div>

    <div style="margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,0.05);">
      <div style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.12);margin-bottom:0.5rem;">Invite link</div>
      <div style="font-size:0.8rem;color:rgba(200,169,110,0.5);word-break:break-all;margin-bottom:0.75rem;">${inviteUrl}</div>
      <button class="btn-invite" id="btn-copy-invite-bottom">Copy invite link</button>
    </div>
  `;

  document.getElementById('btn-invite-copy').addEventListener('click', function() {
    copyToClipboard(inviteUrl, this);
    this.textContent = 'Copied!';
    setTimeout(() => { this.textContent = 'Invite someone to this team'; }, 2000);
  });

  document.getElementById('btn-copy-invite-bottom').addEventListener('click', function() {
    copyToClipboard(inviteUrl, this);
  });

  document.title = `Chord — ${team.name}`;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('team-view').style.display = 'block';
}

// ─── Fetch & render ───────────────────────────────────────────────────────────
(async () => {
  const params = new URLSearchParams(window.location.search);
  const teamId = params.get('id');

  if (!teamId) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-state').style.display = 'flex';
    return;
  }

  try {
    const [teamRes, membersRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/chord_teams?id=eq.${teamId}&select=*`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      }),
      fetch(`${SUPABASE_URL}/rest/v1/chord_team_members?team_id=eq.${teamId}&select=*&order=joined_at.asc`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      })
    ]);

    const [teams, members] = await Promise.all([teamRes.json(), membersRes.json()]);

    if (!teams || !teams[0]) throw new Error('Team not found');
    render(teams[0], members || []);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-state').style.display = 'flex';
  }
})();
</script>

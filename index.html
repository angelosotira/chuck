<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chuck.neoteric.art</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1e1e1e;
      --text: #e8e8e8;
      --muted: #444;
      --accent: #c8a96e;
      --mono: 'Courier New', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    header {
      max-width: 1100px;
      margin: 0 auto 48px;
      display: flex;
      align-items: baseline;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: normal;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    header span {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
    }

    .card {
      display: block;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      aspect-ratio: 16 / 10;
      transition: border-color 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    .card:hover img {
      opacity: 1;
    }

    .card-no-thumb {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .card-meta {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 14px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-date {
      margin-top: 3px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: rgba(255,255,255,0.45);
    }

    .empty {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      padding: 60px 0;
      text-align: center;
    }

    footer {
      max-width: 1100px;
      margin: 56px auto 0;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <header>
    <h1>chuck.neoteric.art</h1>
    <span>— publishing space</span>
  </header>

  <main>

    <!-- GRID START -->
    <div class="empty">— nothing published yet —</div>
    <!-- GRID END -->

  </main>

  <footer>
    &copy; 2026 &nbsp;·&nbsp; updated automatically
  </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chuck.neoteric.art</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --text: #fff;
      --muted: rgba(255,255,255,0.38);
      --gap: 2px;
      --mono: 'Courier New', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 100%);
      pointer-events: none;
    }

    nav a, nav span {
      pointer-events: auto;
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      opacity: 0.9;
    }

    .nav-count {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      display: block;
      text-decoration: none;
      background: #080808;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.55s cubic-bezier(.22,.68,0,1.1), filter 0.4s ease;
      filter: brightness(0.82) saturate(0.9);
    }

    .card:hover img {
      transform: scale(1.05);
      filter: brightness(1.05) saturate(1.1);
    }

    /* empty card */
    .card-empty {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-empty span {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: #1c1c1c;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── Label (hover reveal) ── */
    .card-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 40px 20px 18px;
      background: linear-gradient(to top, rgba(0,0,0,0.78) 0%, transparent 100%);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.28s ease, transform 0.28s ease;
    }

    .card:hover .card-label {
      opacity: 1;
      transform: translateY(0);
    }

    .card-title {
      font-size: 0.82rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .card-meta {
      margin-top: 4px;
      font-family: var(--mono);
      font-size: 0.58rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">chuck.neoteric.art</a>
    <span class="nav-count" id="count"></span>
  </nav>

  <div class="grid" id="grid"></div>

  <script>
    const artworks = [
      // ── Nebula Weather Map ──────────────────────────────────────────────────
      { title: "Nebula Weather Map",     date: "2026", type: "WebGL · astrological",  href: "nebula-config.html",   thumb: "thumbs/nebula-config.jpg"          },
      { title: "Nebula · Art",           date: "2026", type: "WebGL · live",          href: "nebula-art.html",      thumb: "thumbs/nebula-art.jpg"             },
      { title: "Nebula · Reading",       date: "2026", type: "astrological · text",   href: "nebula-reading.html",  thumb: "thumbs/nebula-art.jpg"             },
      { title: "Nebula · About",         date: "2026", type: "editorial",             href: "nebula-about.html",    thumb: "thumbs/nebula-config.jpg"          },

      // ── Mandala series ──────────────────────────────────────────────────────
      { title: "Mandala",                date: "2026", type: "interactive",           href: "mandala.html",         thumb: "thumbs/mandala.jpg"                },
      { title: "Mandala I",              date: "2026", type: "interactive",           href: "mandala1.html",        thumb: "thumbs/mandala1.jpg"               },
      { title: "Mandala II",             date: "2026", type: "interactive",           href: "mandala2.html",        thumb: "thumbs/mandala2.jpg"               },
      { title: "Mandala III",            date: "2026", type: "interactive",           href: "mandala3.html",        thumb: "thumbs/mandala3.jpg"               },
      { title: "Mandala IV",             date: "2026", type: "interactive",           href: "mandala4.html",        thumb: "thumbs/mandala4.jpg"               },

      // ── Organism ────────────────────────────────────────────────────────────
      { title: "Organism I",             date: "2026", type: "generative",            href: "organism1.html",       thumb: "thumbs/organism1.jpg"              },

      // ── Invader series (10 variations) ─────────────────────────────────────
      { title: "Neon Invader",           date: "2026", type: "generative",            href: "invader-neon.html",    thumb: "thumbs/invader-neon.jpg"           },
      { title: "Glitch Invader",         date: "2026", type: "generative",            href: "invader-glitch.html",  thumb: "thumbs/invader-glitch.jpg"         },
      { title: "Constellation Invader",  date: "2026", type: "generative",            href: "invader-constellation.html", thumb: "thumbs/invader-constellation.jpg" },
      { title: "Crystal Invader",        date: "2026", type: "generative",            href: "invader-crystal.html", thumb: "thumbs/invader-crystal.jpg"        },
      { title: "Organic Invader",        date: "2026", type: "generative",            href: "invader-organic.html", thumb: "thumbs/invader-organic.jpg"        },
      { title: "Matrix Invader",         date: "2026", type: "generative",            href: "invader-matrix.html",  thumb: "thumbs/invader-matrix.jpg"         },
      { title: "Wireframe Invader",      date: "2026", type: "generative",            href: "invader-wireframe.html", thumb: "thumbs/invader-wireframe.jpg"    },
      { title: "Watercolor Invader",     date: "2026", type: "generative",            href: "invader-watercolor.html", thumb: "thumbs/invader-watercolor.jpg"  },
      { title: "Circuit Invader",        date: "2026", type: "generative",            href: "invader-circuit.html", thumb: "thumbs/invader-circuit.jpg"        },
      { title: "Plasma Invader",         date: "2026", type: "generative",            href: "invader-plasma.html",  thumb: "thumbs/invader-plasma.jpg"         },

      // ── Original invaders ───────────────────────────────────────────────────
      { title: "High Res Invader",       date: "2026", type: "generative",            href: "hires-invader.html",   thumb: "thumbs/hires-invader.jpg"          },
      { title: "Generative Invader",     date: "2026", type: "generative",            href: "generative-invader.html", thumb: "thumbs/generative-invader.jpg"  },
      { title: "Invader",                date: "2026", type: "pixel art",             href: "invader.html",         thumb: "thumbs/invader.jpg"                },

      // ── Tribute ─────────────────────────────────────────────────────────────
      { title: "Kelsey",                 date: "2026", type: "tribute",               href: "kelsey.html",          thumb: "thumbs/kelsey.jpg"                 },
    ];

    const grid = document.getElementById('grid');
    document.getElementById('count').textContent = artworks.length + ' works';

    artworks.forEach(a => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = a.href;

      if (a.thumb) {
        const img = document.createElement('img');
        img.src = a.thumb;
        img.alt = a.title;
        img.loading = 'lazy';
        card.appendChild(img);
      } else {
        const empty = document.createElement('div');
        empty.className = 'card-empty';
        empty.innerHTML = '<span>' + (a.type || 'work') + '</span>';
        card.appendChild(empty);
      }

      const label = document.createElement('div');
      label.className = 'card-label';
      label.innerHTML =
        '<div class="card-title">' + a.title + '</div>' +
        '<div class="card-meta">' + a.date + (a.type ? ' &nbsp;·&nbsp; ' + a.type : '') + '</div>';
      card.appendChild(label);

      grid.appendChild(card);
    });
  </script>

</body>
</html>

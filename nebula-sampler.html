<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Transit Nebula I — Sampler</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #000; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; }
    nav { padding: 24px 28px; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-family: 'Courier New', monospace; font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-decoration: none; }
    h1 { font-family: 'Courier New', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 0 28px 32px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; }
    @media (min-width: 800px) { .grid { grid-template-columns: repeat(5, 1fr); } }
    .card { position: relative; aspect-ratio: 4/3; overflow: hidden; display: block; text-decoration: none; background: #080808; cursor: pointer; }
    .card img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.9); transition: filter 0.3s; }
    .card:hover img { filter: brightness(1.1); }
    .card-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 14px 12px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); opacity: 0; transition: opacity 0.25s; }
    .card:hover .card-label { opacity: 1; }
    .card-date { font-family: 'Courier New', monospace; font-size: 0.6rem; letter-spacing: 0.08em; color: rgba(255,255,255,0.7); }
    .card-link { display: block; margin-top: 4px; font-family: 'Courier New', monospace; font-size: 0.52rem; letter-spacing: 0.06em; color: rgba(255,255,255,0.35); text-transform: uppercase; }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">← chuck.neoteric.art</a>
  </nav>
  <h1>Transit Nebula I — 10 Date Samples</h1>
  <div class="grid">
    <!-- cards injected by JS -->
  </div>
  <script>
    const samples = [
      { n: 1,  date: "1991-03-15", label: "March 15, 1991"    },
      { n: 2,  date: "1993-07-22", label: "July 22, 1993"     },
      { n: 3,  date: "1995-11-08", label: "November 8, 1995"  },
      { n: 4,  date: "1997-04-30", label: "April 30, 1997"    },
      { n: 5,  date: "1999-09-14", label: "September 14, 1999"},
      { n: 6,  date: "2001-01-03", label: "January 3, 2001"   },
      { n: 7,  date: "2002-06-17", label: "June 17, 2002"     },
      { n: 8,  date: "2003-12-25", label: "December 25, 2003" },
      { n: 9,  date: "1992-08-11", label: "August 11, 1992"   },
      { n: 10, date: "2000-05-29", label: "May 29, 2000"      },
    ];
    const grid = document.querySelector('.grid');
    samples.forEach(s => {
      const params = `?birth=${s.date}&time=12:00&lat=33.4484&lon=-112.0740`;
      grid.innerHTML += `
        <a class="card" href="nebula-art.html${params}" target="_blank">
          <img src="thumbs/nebula-sample-${s.n}.jpg" alt="${s.label}" loading="lazy">
          <div class="card-label">
            <div class="card-date">${s.label}</div>
            <div class="card-link">Open full nebula →</div>
          </div>
        </a>`;
    });
  </script>
</body>
</html>

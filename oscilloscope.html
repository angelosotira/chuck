<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Transit Signal — Oscilloscope</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#000;overflow:hidden;width:100%;height:100%;}
body{display:flex;align-items:center;justify-content:center;}
canvas{display:block;max-width:100vw;max-height:100vh;}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
// ─── BIRTH CONFIG ─────────────────────────────────────────────────────────
// Default: Angelo, born 1984-07-04, New York
// Override via URL params: ?year=1984&month=7&day=4&hour=12&lat=40.71&lon=-74.01&tz=-5
const P = new URLSearchParams(location.search);
const BIRTH = {
  year:  parseInt(P.get('year')  || '1984'),
  month: parseInt(P.get('month') || '7'),
  day:   parseInt(P.get('day')   || '4'),
  hour:  parseFloat(P.get('hour') || '12'),
  lat:   parseFloat(P.get('lat')  || '40.71'),
  lon:   parseFloat(P.get('lon')  || '-74.01'),
  tz:    parseFloat(P.get('tz')   || '-5'),
};

// ─── EPHEMERIS MATH ───────────────────────────────────────────────────────
function jd(y,m,d,h){
  if(m<=2){y--;m+=12;}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+h/24+B-1524.5;
}
function n360(x){return((x%360)+360)%360;}
function sLon(j){
  const n=j-2451545,L=n360(280.46646+0.9856474*n),g=n360(357.52911+0.9856003*n)*Math.PI/180;
  return n360(L+1.914602*Math.sin(g)+0.019993*Math.sin(2*g));
}
function mLon(j){
  const T=(j-2451545)/36525,
    L=n360(218.3165+481267.8813*T),
    M=n360(357.5291+35999.0503*T)*Math.PI/180,
    Mm=n360(134.9634+477198.8676*T)*Math.PI/180,
    F=n360(93.2721+483202.0175*T)*Math.PI/180,
    D=n360(297.8502+445267.1115*T)*Math.PI/180;
  return n360(L+6.288*Math.sin(Mm)+1.274*Math.sin(2*D-Mm)+0.658*Math.sin(2*D)+0.214*Math.sin(2*Mm)-0.186*Math.sin(M)-0.114*Math.sin(2*F)+0.059*Math.sin(2*D-2*Mm));
}
const PL_ORB={
  Mercury:{L0:252.25032,dm:4.09235555},
  Venus:  {L0:181.97971,dm:1.60213034},
  Mars:   {L0:355.45332,dm:0.52402068},
  Jupiter:{L0:34.35484, dm:0.08308453},
  Saturn: {L0:50.07742, dm:0.03344395},
  Uranus: {L0:314.055,  dm:0.01172834},
};
function plLon(nm,j){
  if(nm==='Sun') return sLon(j);
  if(nm==='Moon') return mLon(j);
  const p=PL_ORB[nm];
  return n360(p.L0+p.dm*(j-2451545));
}
function allPos(j){
  const r={};
  for(const nm of['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus'])
    r[nm]=plLon(nm,j);
  return r;
}
function aspSc(diff){
  const d=Math.min(Math.abs(n360(diff)),360-Math.abs(n360(diff)));
  if(d<8)  return 0.5;
  if(Math.abs(d-60)<6)  return 2;
  if(Math.abs(d-90)<7)  return -2.5;
  if(Math.abs(d-120)<8) return 3;
  if(Math.abs(d-150)<5) return -1;
  if(Math.abs(d-180)<8) return -2;
  return 0;
}

// ─── AXES ─────────────────────────────────────────────────────────────────
const AXES=[
  {name:'Vitality',  pl:'Sun',     sym:'☉', hex:'#FFB347'},
  {name:'Intuition', pl:'Moon',    sym:'☽', hex:'#B0C4DE'},
  {name:'Mind',      pl:'Mercury', sym:'☿', hex:'#00E5FF'},
  {name:'Love',      pl:'Venus',   sym:'♀', hex:'#FF69B4'},
  {name:'Drive',     pl:'Mars',    sym:'♂', hex:'#DC143C'},
  {name:'Abundance', pl:'Jupiter', sym:'♃', hex:'#50C878'},
  {name:'Structure', pl:'Saturn',  sym:'♄', hex:'#9090FF'},
  {name:'Awakening', pl:'Uranus',  sym:'♅', hex:'#BF5FFF'},
];

function hexRgb(h){
  return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
}

// ─── ASTRO INIT ───────────────────────────────────────────────────────────
const NOW=new Date();
const TODAY_JD=jd(NOW.getFullYear(),NOW.getMonth()+1,NOW.getDate(),NOW.getUTCHours()+NOW.getUTCMinutes()/60);
const TODAY_POS=allPos(TODAY_JD);
const BIRTH_JD=jd(BIRTH.year,BIRTH.month,BIRTH.day,BIRTH.hour-BIRTH.tz);
const NATAL_POS=allPos(BIRTH_JD);

function computeScores(){
  const out=[];
  for(const ax of AXES){
    let raw=0;
    const np=NATAL_POS[ax.pl];
    for(const[tn,tl]of Object.entries(TODAY_POS)){
      const w=['Jupiter','Saturn','Sun','Moon'].includes(tn)?1.3:1;
      raw+=aspSc(tl-np)*w;
    }
    out.push(Math.max(0.06,Math.min(0.94,0.5+raw/20)));
  }
  return out;
}
const SCORES=computeScores();

// ─── CANVAS ───────────────────────────────────────────────────────────────
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const W=1920,H=1080;
cv.width=W;cv.height=H;

const L_PAD=96;   // left margin
const R_PAD=72;   // right margin
const WAVE_W=W-L_PAD-R_PAD;
const BAND_H=H/8;

// Pre-parse colors
const COLORS=AXES.map(ax=>hexRgb(ax.hex));

// Scroll: one full wave-width per 18 seconds at 60fps
const OMEGA=2*Math.PI/(18*60);

let frame=0;

// Light noise table for waveform texture
const NLEN=512;
const NTBL=new Float32Array(NLEN);
for(let i=0;i<NLEN;i++) NTBL[i]=Math.sin(i*0.7+Math.cos(i*0.3+1.1)*2.1)*0.5+Math.sin(i*1.3+0.7)*0.5;
function noise1(x){
  const xi=Math.floor(x)&(NLEN-1);
  const xf=x-Math.floor(x);
  const u=xf*xf*(3-2*xf);
  return NTBL[xi]*(1-u)+NTBL[(xi+1)&(NLEN-1)]*u;
}

// ─── DRAW ─────────────────────────────────────────────────────────────────
function draw(){
  // Background
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  // Scanline grid (Ikeda-style)
  for(let y=0;y<H;y+=4){
    ctx.fillStyle='rgba(255,255,255,0.012)';
    ctx.fillRect(0,y,W,1);
  }
  // Vertical markers every 10%
  const vstep=WAVE_W/10;
  for(let i=0;i<=10;i++){
    ctx.fillStyle='rgba(255,255,255,0.018)';
    ctx.fillRect(Math.round(L_PAD+i*vstep),0,1,H);
  }

  // Band separators
  ctx.strokeStyle='rgba(255,255,255,0.055)';
  ctx.lineWidth=1;
  for(let i=1;i<8;i++){
    const y=Math.round(i*BAND_H);
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  // Left/right boundary lines
  ctx.strokeStyle='rgba(255,255,255,0.07)';
  ctx.beginPath();ctx.moveTo(L_PAD,0);ctx.lineTo(L_PAD,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W-R_PAD,0);ctx.lineTo(W-R_PAD,H);ctx.stroke();

  const t=frame*OMEGA;

  for(let i=0;i<8;i++){
    const ax=AXES[i];
    const sc=SCORES[i];
    const [r,g,b]=COLORS[i];
    const cy=Math.round((i+0.5)*BAND_H);

    const amp=sc*BAND_H*0.40;
    const freq=1.2+sc*4.8;
    const opacity=0.25+sc*0.75;
    const lw=0.8+sc*1.4;
    const glow=sc*14;

    // Center line
    ctx.strokeStyle=`rgba(${r},${g},${b},0.07)`;
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(L_PAD,cy);ctx.lineTo(W-R_PAD,cy);
    ctx.stroke();

    // Main waveform
    ctx.strokeStyle=`rgba(${r},${g},${b},${opacity.toFixed(3)})`;
    ctx.lineWidth=lw;
    ctx.shadowColor=ax.hex;
    ctx.shadowBlur=glow;
    ctx.lineJoin='round';
    ctx.beginPath();
    for(let px=0;px<=WAVE_W;px++){
      const xn=px/WAVE_W;
      const phase=2*Math.PI*freq*xn+t;
      const sig=(
        Math.sin(phase)*0.65+
        Math.sin(phase*2.17+0.9)*0.20+
        Math.sin(phase*0.48-1.3)*0.10+
        noise1(xn*freq*3+t*0.3)*0.05
      );
      const y=cy+amp*sig;
      if(px===0) ctx.moveTo(L_PAD+px,y); else ctx.lineTo(L_PAD+px,y);
    }
    ctx.stroke();

    // Bright highlight line (Ikeda precision)
    if(sc>0.35){
      ctx.strokeStyle=`rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},${(sc*0.45).toFixed(3)})`;
      ctx.lineWidth=0.6;
      ctx.shadowBlur=glow*0.4;
      ctx.beginPath();
      for(let px=0;px<=WAVE_W;px++){
        const xn=px/WAVE_W;
        const phase=2*Math.PI*freq*xn+t;
        const sig=Math.sin(phase)*0.65+Math.sin(phase*2.17+0.9)*0.20+Math.sin(phase*0.48-1.3)*0.10+noise1(xn*freq*3+t*0.3)*0.05;
        const y=cy+amp*sig;
        if(px===0) ctx.moveTo(L_PAD+px,y); else ctx.lineTo(L_PAD+px,y);
      }
      ctx.stroke();
    }

    ctx.shadowBlur=0;

    // Left label — planet symbol
    ctx.font=`${Math.round(BAND_H*0.30)}px serif`;
    ctx.fillStyle=`rgba(${r},${g},${b},${(0.45+sc*0.55).toFixed(3)})`;
    ctx.shadowColor=ax.hex;
    ctx.shadowBlur=sc*8;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(ax.sym, L_PAD*0.40, cy-BAND_H*0.10);

    // Axis name
    ctx.font=`${Math.round(BAND_H*0.095)}px 'Courier New',monospace`;
    ctx.fillStyle=`rgba(${r},${g},${b},${(0.25+sc*0.35).toFixed(3)})`;
    ctx.shadowBlur=0;
    ctx.fillText(ax.name.toUpperCase(), L_PAD*0.40, cy+BAND_H*0.20);

    // Right score
    const scoreStr=Math.round(sc*100).toString().padStart(3,'0');
    ctx.font=`${Math.round(BAND_H*0.16)}px 'Courier New',monospace`;
    ctx.fillStyle=`rgba(${r},${g},${b},${(0.30+sc*0.50).toFixed(3)})`;
    ctx.shadowColor=ax.hex;
    ctx.shadowBlur=sc*6;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(scoreStr, W-R_PAD*0.40, cy);
    ctx.shadowBlur=0;
  }

  // Header metadata
  ctx.font='11px "Courier New",monospace';
  ctx.fillStyle='rgba(255,255,255,0.10)';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  const dateStr=NOW.toISOString().slice(0,10);
  const birthStr=`${BIRTH.year}-${String(BIRTH.month).padStart(2,'0')}-${String(BIRTH.day).padStart(2,'0')}`;
  ctx.fillText(`TRANSIT SIGNAL  ·  ${dateStr}`, L_PAD, 12);
  ctx.textAlign='right';
  ctx.fillText(`NATAL ${birthStr}  ·  40°42'N 74°00'W`, W-R_PAD, 12);

  // Footer
  ctx.font='10px "Courier New",monospace';
  ctx.fillStyle='rgba(255,255,255,0.06)';
  ctx.textAlign='left';
  ctx.textBaseline='bottom';
  ctx.fillText('OSCILLOSCOPE / ASTROLOGICAL TRANSIT SIGNAL  ·  8-AXIS PLANETARY READOUT', L_PAD, H-10);
  ctx.textAlign='right';
  ctx.fillText('CHUCK.NEOTERIC.ART', W-R_PAD, H-10);

  frame++;
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>

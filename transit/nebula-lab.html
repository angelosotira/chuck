<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Transit Nebula — Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
canvas{display:block;position:fixed;top:0;left:0;width:100vw;height:100vh;}

/* ── Controls overlay ───────────────────────────────────────── */
#controls{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding:24px 40px 28px;
  background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.5) 70%,transparent 100%);
  backdrop-filter:blur(0px);
  display:flex;flex-direction:column;gap:16px;
}
.ctrl-row{
  display:flex;align-items:center;gap:20px;
}
.ctrl-name{
  font-family:'Courier New',monospace;font-size:.58rem;letter-spacing:.2em;
  text-transform:uppercase;color:rgba(255,255,255,0.55);
  width:88px;flex-shrink:0;
}
.ctrl-track{flex:1;position:relative;display:flex;align-items:center;gap:12px;}
.ctrl-edge{
  font-family:'Courier New',monospace;font-size:.48rem;letter-spacing:.1em;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}
.ctrl-edge.left{color:rgba(255,255,255,0.25);}
.ctrl-edge.right{color:rgba(180,130,255,0.55);}
input[type=range]{
  flex:1;height:2px;
  -webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,0.12);outline:none;cursor:pointer;
  border-radius:2px;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:#fff;border:2px solid rgba(180,130,255,0.8);
  box-shadow:0 0 8px rgba(180,130,255,0.4);cursor:pointer;
}
input[type=range]::-webkit-slider-runnable-track{
  height:2px;border-radius:2px;
  background:linear-gradient(to right,rgba(180,130,255,0.5) 0%,rgba(180,130,255,0.5) var(--pct,0%),rgba(255,255,255,0.1) var(--pct,0%));
}
.ctrl-val{
  font-family:'Courier New',monospace;font-size:.52rem;
  color:rgba(255,255,255,0.3);width:30px;text-align:right;flex-shrink:0;
}

/* ── Top label ──────────────────────────────────────────────── */
#top-label{
  position:fixed;top:16px;left:20px;z-index:100;
  font-family:'Courier New',monospace;font-size:.55rem;
  letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,0.2);
}
#menu-btn{z-index:100;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="top-label">Transit Nebula — Lab</div>

<div id="controls">
  <!-- ACCRETION -->
  <div class="ctrl-row">
    <span class="ctrl-name">Accretion</span>
    <div class="ctrl-track">
      <span class="ctrl-edge left">Nebula I</span>
      <input type="range" id="sl-accretion" min="0" max="255" value="0"
             oninput="onAccretion(this.value)">
      <span class="ctrl-edge right">Nebula X</span>
    </div>
    <span class="ctrl-val" id="val-accretion">0</span>
  </div>
  <!-- DRIFT -->
  <div class="ctrl-row">
    <span class="ctrl-name">Drift</span>
    <div class="ctrl-track">
      <span class="ctrl-edge left">Still</span>
      <input type="range" id="sl-drift" min="0" max="255" value="32"
             oninput="onDrift(this.value)">
      <span class="ctrl-edge right">Fast</span>
    </div>
    <span class="ctrl-val" id="val-drift">32</span>
  </div>
</div>

<script>
// ── URL params ──────────────────────────────────────────────────────────────
const P       = new URLSearchParams(location.search);
const pName   = P.get('name')  || null;
const pBirth  = P.get('birth') || null;
const pTime   = P.get('time')  || '12:00';
const pLat    = parseFloat(P.get('lat')  || '0');
const pLon    = parseFloat(P.get('lon')  || '0');

// ── Ephemeris ───────────────────────────────────────────────────────────────
function jd(y,m,d,h=12){if(m<=2){y--;m+=12;}const A=Math.floor(y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+h/24+B-1524.5;}
function n360(x){return((x%360)+360)%360;}
function sLon(j){const n=j-2451545,L=n360(280.46646+0.9856474*n),g=n360(357.52911+0.9856003*n)*Math.PI/180;return n360(L+1.914602*Math.sin(g)+0.019993*Math.sin(2*g));}
function mLon(j){const T=(j-2451545)/36525,L=n360(218.3165+481267.8813*T),M=n360(357.5291+35999.0503*T)*Math.PI/180,Mm=n360(134.9634+477198.8676*T)*Math.PI/180,F=n360(93.2721+483202.0175*T)*Math.PI/180,D=n360(297.8502+445267.1115*T)*Math.PI/180;return n360(L+6.288*Math.sin(Mm)+1.274*Math.sin(2*D-Mm)+0.658*Math.sin(2*D)+0.214*Math.sin(2*Mm)-0.186*Math.sin(M)-0.114*Math.sin(2*F)+0.059*Math.sin(2*D-2*Mm));}
const PL={Mercury:{L0:252.25032,dm:4.09235555},Venus:{L0:181.97971,dm:1.60213034},Mars:{L0:355.45332,dm:0.52402068},Jupiter:{L0:34.35484,dm:0.08308453},Saturn:{L0:50.07742,dm:0.03344395},Uranus:{L0:314.055,dm:0.01172834}};
function plLon(nm,j){if(nm==='Sun')return sLon(j);if(nm==='Moon')return mLon(j);const p=PL[nm];return n360(p.L0+p.dm*(j-2451545));}
const PLANET_NAMES=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus'];
function allPos(j){const r={};for(const nm of PLANET_NAMES)r[nm]=plLon(nm,j);return r;}
function computeScores(){
  if(!pBirth)return[0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5];
  const[by,bm,bd]=pBirth.split('-').map(Number);
  const[bh,bmin]=pTime.split(':').map(Number);
  const bJD=jd(by,bm,bd,bh+(bmin||0)/60);
  const natal=allPos(bJD);
  const now=new Date();
  const todayJD=jd(now.getFullYear(),now.getMonth()+1,now.getDate(),now.getUTCHours()+now.getUTCMinutes()/60);
  const today=allPos(todayJD);
  return PLANET_NAMES.map(nm=>{const diff=Math.abs(n360(today[nm]-natal[nm]));const ang=Math.min(diff,360-diff);return Math.max(0,Math.min(1,1.0-ang/180.0));});
}
const SCORES=computeScores();

// ── Shaders ─────────────────────────────────────────────────────────────────
const VS=`#version 300 es
in vec2 a_pos;
void main(){gl_Position=vec4(a_pos,0.0,1.0);}`;

const FS=`#version 300 es
precision highp float;
uniform float u_time;
uniform vec2  u_resolution;
uniform float u_scores[8];
uniform float u_accretion; // 0.0=Nebula I ... 1.0=Nebula X
uniform float u_drift;     // animation speed multiplier
out vec4 fragColor;

vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
  vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;
  vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
  vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
  i=mod289(i);
  vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
  float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.0*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
  vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
  return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
float fbm(vec2 p,float seed){
  float v=0.0,a=0.5,f=1.0;mat2 R=mat2(0.8,0.6,-0.6,0.8);
  for(int i=0;i<8;i++){v+=a*snoise(vec3(p*f,seed+u_time*0.006*u_drift));p=R*p;a*=0.5;f*=2.07;}
  return v;
}
float warpedFbm(vec2 p,float seed){
  vec2 q=vec2(fbm(p,seed+0.0),fbm(p+vec2(5.2,1.3),seed+1.7));
  vec2 r=vec2(fbm(p+4.0*q+vec2(1.7,9.2),seed+3.4),fbm(p+4.0*q+vec2(8.3,2.8),seed+5.1));
  return fbm(p+4.5*r,seed+7.3);
}
void main(){
  vec2 uv=(gl_FragCoord.xy/u_resolution)*2.0-1.0;
  uv.x*=u_resolution.x/u_resolution.y;

  // ── Accretion drives UV scale: wider view = larger cloud structures ───────
  float uvScale = mix(0.72, 0.28, u_accretion);
  uv *= uvScale;

  vec3 col[8];
  col[0]=vec3(1.00,0.55,0.05);col[1]=vec3(0.40,0.65,1.00);col[2]=vec3(0.00,0.95,0.95);
  col[3]=vec3(1.00,0.20,0.60);col[4]=vec3(0.90,0.10,0.00);col[5]=vec3(0.10,0.85,0.30);
  col[6]=vec3(0.50,0.10,1.00);col[7]=vec3(0.80,0.00,1.00);
  float seeds[8];
  seeds[0]=0.0;seeds[1]=17.3;seeds[2]=34.6;seeds[3]=51.9;
  seeds[4]=69.2;seeds[5]=86.5;seeds[6]=103.8;seeds[7]=121.1;

  // ── Fixed axis offsets — accretion controls how far apart each color drifts
  vec2 axisOffsets[8];
  axisOffsets[0]=vec2( 0.00, 0.00);axisOffsets[1]=vec2( 1.70, 0.65);
  axisOffsets[2]=vec2(-1.30, 1.10);axisOffsets[3]=vec2( 0.55,-1.50);
  axisOffsets[4]=vec2(-0.75,-1.20);axisOffsets[5]=vec2( 1.45,-0.45);
  axisOffsets[6]=vec2(-1.55, 0.25);axisOffsets[7]=vec2( 0.35, 1.65);

  // ── Accretion-driven shader parameters ───────────────────────────────────
  float offsetStrength = mix(0.00, 3.20, u_accretion); // spatial separation
  float axisScale      = mix(0.55, 0.44, u_accretion); // fBm sampling scale
  float threshold      = mix(0.10, 0.40, u_accretion); // clipping floor
  float expo           = mix(1.50, 5.50, u_accretion); // contrast exponent
  float scoreAmp       = mix(2.50, 9.00, u_accretion); // color saturation

  float envelope = 1.0;
  vec3 nebulaColor = vec3(0.0, 0.0, mix(0.01, 0.0, u_accretion));

  for(int i=0;i<8;i++){
    float score=u_scores[i];if(score<0.02)continue;
    vec2 axisUv=(uv+axisOffsets[i]*offsetStrength)*axisScale;
    float axisField=warpedFbm(axisUv,seeds[i]);
    axisField=axisField*0.5+0.5;
    axisField=pow(max(0.0,axisField-threshold),expo);
    axisField*=score*scoreAmp;
    nebulaColor+=axisField*col[i];
  }

  float coreDist=length(uv);
  float core=exp(-coreDist*coreDist/(0.18*0.18));
  float coreFbm=warpedFbm(uv*1.5,200.0)*0.5+0.5;
  core*=coreFbm*1.5;
  vec3 coreColor=vec3(0.0);float totalScore=0.0;
  for(int i=0;i<8;i++){coreColor+=col[i]*u_scores[i];totalScore+=u_scores[i];}
  if(totalScore>0.0)coreColor/=totalScore;
  nebulaColor+=core*(coreColor*0.4+vec3(0.7,0.65,0.6))*0.8;

  // Filaments — more pronounced as accretion increases
  float filFreq = mix(2.0, 3.2, u_accretion);
  float filament=abs(warpedFbm(uv*filFreq,300.0));
  float filThresh = mix(0.18, 0.12, u_accretion);
  filament=(1.0-smoothstep(0.0,filThresh,filament))*mix(0.25,0.42,u_accretion);
  nebulaColor+=filament*mix(coreColor,vec3(0.8,0.9,1.0),0.4);

  float dust=warpedFbm(uv*1.1+vec2(4.7,2.3),400.0);
  dust=smoothstep(0.5,0.72,dust)*envelope*0.65;
  nebulaColor*=1.0-dust;

  float lum=dot(nebulaColor,vec3(0.2126,0.7152,0.0722));
  nebulaColor=nebulaColor/(1.0+lum*0.6);
  nebulaColor=pow(nebulaColor,vec3(0.88));

  vec2 sid=floor(uv*200.0);vec2 slc=fract(uv*200.0)-0.5;
  float sh=fract(sin(dot(sid,vec2(127.1,311.7)))*43758.5453);
  if(sh>0.997){float sb=fract(sin(dot(sid,vec2(269.5,183.3)))*17375.32);float sr=length(slc);float starBright=exp(-sr*90.0)*sb*2.0;starBright+=exp(-abs(slc.x)*180.0)*exp(-sr*6.0)*sb*0.5;starBright+=exp(-abs(slc.y)*180.0)*exp(-sr*6.0)*sb*0.5;nebulaColor+=starBright*vec3(1.0,0.97,0.9);}
  fragColor=vec4(nebulaColor,1.0);
}`;

// ── WebGL init ──────────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const gl=canvas.getContext('webgl2',{antialias:false,alpha:false});
if(!gl){document.body.innerHTML='<p style="color:#fff;padding:40px;font-family:monospace">WebGL2 required.</p>';throw new Error('no webgl2');}

function mkShader(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));throw new Error('shader fail');}return s;}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);

const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aPos=gl.getAttribLocation(prog,'a_pos');
gl.enableVertexAttribArray(aPos);gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

const uTime      =gl.getUniformLocation(prog,'u_time');
const uRes       =gl.getUniformLocation(prog,'u_resolution');
const uScores    =gl.getUniformLocation(prog,'u_scores[0]');
const uAccretion =gl.getUniformLocation(prog,'u_accretion');
const uDrift     =gl.getUniformLocation(prog,'u_drift');

// ── Resize ──────────────────────────────────────────────────────────────────
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// ── State ───────────────────────────────────────────────────────────────────
let accretion = 0.0;  // 0–1
let drift     = 32/255 * 2.0; // maps 0–255 → 0–2.0 speed
const startTime = performance.now();

function render(){
  const w=canvas.width,h=canvas.height;
  gl.viewport(0,0,w,h);
  const t=(performance.now()-startTime)/1000;
  gl.uniform1f(uTime,t);
  gl.uniform2f(uRes,w,h);
  gl.uniform1fv(uScores,SCORES);
  gl.uniform1f(uAccretion,accretion);
  gl.uniform1f(uDrift,drift);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(render);
}
render();

// ── Slider callbacks ────────────────────────────────────────────────────────
function onAccretion(val){
  accretion = parseInt(val) / 255;
  document.getElementById('val-accretion').textContent = val;
  // Update track fill
  const pct = (parseInt(val)/255*100).toFixed(1)+'%';
  document.getElementById('sl-accretion').style.setProperty('--pct',pct);
}
function onDrift(val){
  // 0 = almost still (0.02), 255 = fast (4.0) — log-ish curve
  drift = 0.02 + Math.pow(parseInt(val)/255, 1.8) * 4.0;
  document.getElementById('val-drift').textContent = val;
  const pct=(parseInt(val)/255*100).toFixed(1)+'%';
  document.getElementById('sl-drift').style.setProperty('--pct',pct);
}

// Init track fills
onAccretion(0);onDrift(32);

// ── Show skip button if no birth data ───────────────────────────────────────
if(!pBirth){
  const btn=document.createElement('a');
  btn.href=location.pathname+'?name=Angelo&birth=1987-07-01&time=13:14&lat=33.4484&lon=-112.0740';
  btn.textContent='Skip → Demo Chart';
  btn.style.cssText='position:fixed;bottom:110px;right:20px;font-family:"Courier New",monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);text-decoration:none;border:1px solid rgba(255,255,255,0.1);padding:6px 12px;background:rgba(0,0,0,0.5);z-index:999;';
  document.body.appendChild(btn);
}
</script>
</body>
</html>
